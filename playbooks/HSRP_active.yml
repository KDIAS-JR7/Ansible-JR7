- name: Configure HSRP active routers
  hosts: HSRP_Routers
  gather_facts: false

  tasks:
    - name: Configure active routers
      cisco.ios.ios_config:
        lines:
          - interface vlan {{ item.id }}
          - standby {{ item.id }} priority 110
          - standby {{ item.id }} preempt
      loop: "{{ vlans }}"
      when: vlans is defined